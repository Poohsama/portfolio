<!DOCTYPE html>
<html lang="ja">
<head>

            margin: 0 auto;
        }
        h1 {
            font-size: 20px;

        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {

            padding: 8px;
        }
        th {
            background: #f5f5f5;
            text-align: left;
        }

    <table>
        <tr>
            <th>項目</th>
            <th>内容</th>

        <tr>

</html>
